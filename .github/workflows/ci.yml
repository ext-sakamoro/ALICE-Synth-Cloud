name: ALICE Synth Cloud CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test-rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core-engine, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Create dependency stub
        run: |
          mkdir -p ../ALICE-Synth/src
          cat > ../ALICE-Synth/Cargo.toml << 'TOML'
          [package]
          name = "alice-synth"
          version = "0.1.0"
          edition = "2021"
          [features]
          default = []
          std = []
          TOML
          echo "" > ../ALICE-Synth/src/lib.rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/${{ matrix.service }}
      - name: Create sibling stub (avoid path_dependencies_not_reachable)
        if: matrix.service == 'core-engine'
        shell: bash
        run: |
          mkdir -p ../ALICE-Synth/src
          cat > ../ALICE-Synth/Cargo.toml << 'TOML'
          [package]
          name = "alice-synth"
          version = "0.1.0"
          edition = "2021"
          [features]
          default = []
          std = []
          [lib]
          path = "src/lib.rs"
          TOML
          echo "" > ../ALICE-Synth/src/lib.rs
      - run: cd services/${{ matrix.service }} && cargo check
      - run: cd services/${{ matrix.service }} && cargo clippy -- -D warnings
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd frontend && npm ci || npm install
      - run: cd frontend && npm run type-check


  actionlint:
    name: actionlint (workflow YAML 検証)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

